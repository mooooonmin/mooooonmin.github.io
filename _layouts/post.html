---
layout: default
---
{{ content }}

<hr style="margin: 40px 0; border: 0; border-top: 1px solid rgba(0,0,0,0.1);">
<div class="post-navigation" style="display: flex; justify-content: space-between; margin-top: 2rem; font-family: 'Open Sans', sans-serif;">
  <div>
    {% if page.previous.url %}
      <a href="{{ site.baseurl }}{{ page.previous.url }}" role="button" tabindex="0" title="{{ page.previous.title }}" style="text-decoration: none; color: #37352f; font-weight: 600; font-size: 1.1rem; padding: 10px; border-radius: 4px; transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#f7f6f3'" onmouseout="this.style.backgroundColor='transparent'">
        &laquo; {{ page.previous.title | truncate: 25 }}
      </a>
    {% endif %}
  </div>
  <div>
    {% if page.next.url %}
      <a href="{{ site.baseurl }}{{ page.next.url }}" role="button" tabindex="0" title="{{ page.next.title }}" style="text-decoration: none; color: #37352f; font-weight: 600; font-size: 1.1rem; padding: 10px; border-radius: 4px; transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#f7f6f3'" onmouseout="this.style.backgroundColor='transparent'">
        {{ page.next.title | truncate: 25 }} &raquo;
      </a>
    {% endif %}
  </div>
</div>
