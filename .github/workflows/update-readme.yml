name: Update README Index

on:
  push:
    branches:
      - main
      - master
    paths:
      - '_posts/**.md'
      - '_data/categories.json'
      - '_includes/**'
      - '_layouts/**'
      - '_sass/**'
      - 'css/**'
      - 'images/**'
      - 'index.html'
      - 'search.html'
      - '_config.yml'
      - 'docs/**.md'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'scripts/normalize_post_times.py'
      - 'scripts/update_post_categories.py'
      - 'scripts/update_readme.py'
      - 'scripts/generate_pages.py'
      - 'scripts/check_post_format.py'
      - 'scripts/check_code_fences.py'
      - 'scripts/check_duplicate_post_times.py'
      - 'scripts/check_text_encoding.py'
      - 'scripts/smoke_render.py'
      - 'scripts/validate_all.py'
      - 'scripts/category_config.py'
      - '.github/workflows/update-readme.yml'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Validate generated content
        run: python scripts/validate_all.py

      - name: Build static site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run render smoke tests
        run: python scripts/smoke_render.py

      - name: Commit and Push changes
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md category _posts
          git commit -m "docs: auto-update generated pages [skip ci]" || echo "No changes to commit"
          git push
