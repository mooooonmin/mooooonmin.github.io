name: Update README Index

on:
  push:
    branches:
      - main
      - master
    paths:
      - '_posts/**.md'
      - '_data/categories.json'
      - '_includes/**'
      - '_layouts/**'
      - '_sass/**'
      - 'css/**'
      - 'images/**'
      - 'index.html'
      - 'search.html'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'scripts/normalize_post_times.py'
      - 'scripts/update_post_categories.py'
      - 'scripts/update_readme.py'
      - 'scripts/generate_pages.py'
      - 'scripts/check_post_format.py'
      - 'scripts/smoke_render.py'
      - 'scripts/category_config.py'
      - '.github/workflows/update-readme.yml'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Normalize post times
        run: python scripts/normalize_post_times.py

      - name: Update post categories
        run: python scripts/update_post_categories.py

      - name: Generate category pages
        run: python scripts/generate_pages.py

      - name: Run script to update README
        run: python scripts/update_readme.py

      - name: Validate post format
        run: python scripts/check_post_format.py

      - name: Validate code fences
        run: |
          python - <<'PY'
          from pathlib import Path

          bad = []
          for path in Path("_posts").glob("*.md"):
              text = path.read_text(encoding="utf-8")
              if text.count("```") % 2:
                  bad.append(str(path))

          if bad:
              print("\n".join(bad))
              raise SystemExit(1)

          print("All post code fences are balanced.")
          PY

      - name: Validate duplicate post times
        run: |
          python - <<'PY'
          import re
          from collections import defaultdict
          from pathlib import Path

          seen = defaultdict(list)
          for path in Path("_posts").glob("*.md"):
              text = path.read_text(encoding="utf-8-sig")
              match = re.search(
                  r"^date:\s*(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2}:\d{2})\s+([+-]\d{4})\s*$",
                  text,
                  re.MULTILINE,
              )
              if match:
                  date, time, _timezone = match.groups()
                  seen[(date, time)].append(str(path))

          duplicates = {key: paths for key, paths in seen.items() if len(paths) > 1}
          if duplicates:
              for (date, time), paths in duplicates.items():
                  print(date, time)
                  print("\n".join(paths))
              raise SystemExit(1)

          print("No duplicate post date-time values found.")
          PY

      - name: Validate generated diff
        run: git diff --check

      - name: Build static site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run render smoke tests
        run: python scripts/smoke_render.py

      - name: Commit and Push changes
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md category _posts
          git commit -m "docs: auto-update generated pages [skip ci]" || echo "No changes to commit"
          git push
