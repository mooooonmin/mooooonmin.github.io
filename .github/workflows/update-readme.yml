name: Validate and Update Blog

on:
  push:
    branches:
      - main
      - master
    paths:
      - '_posts/**'
      - '_data/**'
      - '_includes/**'
      - '_layouts/**'
      - '_plugins/**'
      - '_sass/**'
      - 'assets/**'
      - 'category/**'
      - 'css/**'
      - 'docs/**'
      - 'images/**'
      - 'scripts/**'
      - 'tags/**'
      - '*.html'
      - '*.json'
      - '_config.yml'
      - '.gitattributes'
      - 'Gemfile'
      - 'Gemfile.lock'
      - '.github/workflows/update-readme.yml'

concurrency:
  group: blog-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Synchronize generated content
        run: python scripts/sync_generated.py

      - name: Validate source
        run: python scripts/validate_all.py

      - name: Build static site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run render smoke tests
        run: python scripts/smoke_render.py

  update-generated:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout latest branch state
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Synchronize generated content
        run: python scripts/sync_generated.py

      - name: Commit and push generated changes
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md category _posts
          if git diff --cached --quiet; then
            echo 'No generated changes to commit'
          else
            git commit -m 'docs: auto-update generated pages [skip ci]'
            git push
          fi
