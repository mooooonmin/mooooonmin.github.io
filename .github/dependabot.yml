version: 2

updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    groups:
      ruby-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    groups:
      workflow-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
